{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pacientes - Cuadra Erre</title>
    <link rel="stylesheet" href="{% static 'gestion/estilos.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Cuadra Erre</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="{% url 'index' %}"><i class="fas fa-home"></i> Inicio</a>
            <a href="#"><i class="fas fa-user-md"></i> Terapeutas</a>
            <a href="{% url 'lista_pacientes' %}" class="active"><i class="fas fa-users"></i> Pacientes</a>
            <a href="#"><i class="fas fa-horse"></i> Caballos</a>
            <a href="{% url 'logout_view' %}" class="btn-logout">Cerrar Sesión</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="welcome-card">
            <h2>Gestión de Pacientes</h2>
            <table class="tabla-moderna">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Fecha Nac.</th>
                        <th>Diagnóstico</th>
                    </tr>
                </thead>
                <tbody>
                    {% for pac in pacientes %}
                    <tr>
                        <td>{{ pac.0 }}</td>
                        <td>{{ pac.1 }}</td>
                        <td>{{ pac.2 }}</td>
                        <td>{{ pac.3 }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
