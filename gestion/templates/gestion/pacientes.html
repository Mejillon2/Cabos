{% extends 'gestion/base.html' %}

{% block content %}
<header class="main-header">
    <h1>Gestión de Pacientes</h1>
</header>

<!-- Formulario para registrar pacientes -->
<div class="welcome-card">
    <div class="card-title">
        <i class="fa-solid fa-child"></i> Registrar Nuevo Paciente
    </div>
    <form method="POST" class="form-horizontal">
        {% csrf_token %}
        <input type="text" name="nombre" placeholder="Nombre completo del niño" required>
        
        <!-- Selector de Padres (viene de la vista que hicimos antes) -->
        <select name="id_padre" required style="padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1;">
            <option value="">Selecciona al Padre/Tutor</option>
            {% for padre in padres %}
                <option value="{{ padre.0 }}">{{ padre.1 }}</option>
            {% endfor %}
        </select>

        <input type="date" name="fecha_nac" title="Fecha de Nacimiento" required>
        <input type="text" name="diagnostico" placeholder="Diagnóstico inicial" required>
        
        <button type="submit" class="btn-logout" style="margin:0; background-color: var(--guinda-principal); cursor:pointer;">
            Registrar Paciente
        </button>
    </form>
</div>

<!-- Tabla de pacientes registrados -->
<div class="welcome-card" style="margin-top: 25px;">
    <div class="card-title"><i class="fa-solid fa-list"></i> Lista de Pacientes</div>
    <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
        <thead>
            <tr style="text-align: left; border-bottom: 2px solid var(--guinda-principal);">
                <th style="padding: 10px;">Paciente</th>
                <th style="padding: 10px;">Padre/Tutor</th>
                <th style="padding: 10px;">Diagnóstico</th>
            </tr>
        </thead>
        <tbody>
            {% for p in pacientes %}
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 10px;">{{ p.0 }}</td>
                <td style="padding: 10px;">{{ p.1 }}</td>
                <td style="padding: 10px;">{{ p.2 }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3" style="text-align: center; padding: 20px;">No hay pacientes registrados.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
