{% extends 'gestion/base.html' %}

{% block content %}
<div class="welcome-card" style="margin-bottom: 20px; padding: 20px;">
    <h2 style="margin: 0; color: #333; display: flex; align-items: center; gap: 12px; font-size: 1.6rem;">
        Reagendar / Modificar Sesión
    </h2>
    <p style="margin: 5px 0 0 0; color: #777; font-size: 0.9rem;">
        Realiza cambios en los horarios o actualiza el personal médico y equino asignado a la terapia.
    </p>
</div>

<div class="welcome-card" style="max-width: 650px; margin: 0 auto; padding: 0; overflow: hidden;">
    <div class="card-title" style="padding: 15px 20px; font-weight: bold; font-size: 1.1rem;">
        Editar Cita (ID Sesión: {{ id_sesion }})
    </div>
    
    <form method="POST" style="padding: 25px; display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <input type="hidden" name="id_caballo_anterior" value="{{ cita_data.id_caballo_actual }}">

        <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Paciente:</label>
            <select name="paciente" required style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; background-color: white; font-size: 0.9rem;">
                {% for p in pacientes %}
                    <option value="{{ p.0 }}" {% if p.0 == cita_data.id_paciente %}selected{% endif %}>{{ p.1 }} (ID: {{ p.0 }})</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Terapeuta Asignado:</label>
            <select name="terapeuta" required style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; background-color: white; font-size: 0.9rem;">
                {% for t in terapeutas %}
                    <option value="{{ t.0 }}" {% if t.0 == cita_data.id_terapeuta %}selected{% endif %}>{{ t.1 }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Caballo Co-terapeuta:</label>
            <select name="caballo" required style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; background-color: white; font-size: 0.9rem;">
                {% for c in caballos %}
                    <option value="{{ c.0 }}" {% if c.0 == cita_data.id_caballo_actual %}selected{% endif %}>🐴 {{ c.1 }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 20px;">
            <div style="flex: 1; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Nueva Fecha:</label>
                <input type="date" name="fecha" value="{{ cita_data.fecha }}" required 
                       style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; font-size: 0.9rem;">
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Nueva Hora:</label>
                <input type="time" name="hora" value="{{ cita_data.hora }}" required 
                       style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; font-size: 0.9rem;">
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 20px;">
            <button type="submit" style="background-color: #800020; color: white; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.95rem;">
                💾 Guardar Cambios
            </button>
            <a href="{% url 'agendar' %}" style="display: flex; align-items: center; justify-content: center; padding: 12px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.95rem;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
