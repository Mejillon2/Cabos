{% extends 'gestion/base.html' %}

{% block content %}
<div class="welcome-card" style="margin-bottom: 20px; padding: 20px;">
    <h2 style="margin: 0; color: #333; display: flex; align-items: center; gap: 12px; font-size: 1.6rem;">
        <i class="fa-solid fa-user-gear" style="color: var(--guinda-principal, #800020);"></i> Modificar Tutor
    </h2>
    <p style="margin: 5px 0 0 0; color: #777; font-size: 0.9rem;">
        Modifica la informaciĂłn de contacto del tutor seleccionado.

</div>

<div class="welcome-card" style="max-width: 600px; padding: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <div class="card-title" style="background-color: #333; color: white; padding: 12px 20px; font-weight: bold; display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-id-card"></i> Formulario de EdiciĂłn (ID: {{ id_persona }})
    </div>
    
    <form method="POST" class="form-horizontal" style="padding: 25px; display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600; color: #444; font-size: 0.9rem;">Nombre Completo:</label>
            <input type="text" name="nombre" value="{{ padre_data.nombre }}" required 
                   style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;"
                   pattern="^[a-zA-ZĂĂŠĂ­ĂłĂşĂĂĂĂĂĂąĂ]{3,}(?: [a-zA-ZĂĂŠĂ­ĂłĂşĂĂĂĂĂĂąĂ]{3,})*$" 
                   title="Solo letras. Cada palabra debe tener mĂ­nimo 3 letras, un solo espacio intermedio y sin espacios a los extremos.">
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600; color: #444; font-size: 0.9rem;">TelĂŠfono de Contacto:</label>
            <input type="text" name="telefono" value="{{ padre_data.telefono }}" 
                   style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;"
                   pattern="^\d{10}$" 
                   title="El telĂŠfono debe tener exactamente 10 dĂ­gitos numĂŠricos, sin espacios ni guiones.">
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: 600; color: #444; font-size: 0.9rem;">Correo ElectrĂłnico:</label>
            <input type="email" name="correo" value="{{ padre_data.email }}" 
                   style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;"
                   pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" 
                   title="Debe ser un correo vĂĄlido que termine estrictamente en @gmail.com">
        </div>

        <div style="display: flex; gap: 15px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 20px;">
            <button type="submit" style="background-color: var(--guinda-principal, #800020); color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                đž Guardar Cambios

            <a href="{% url 'lista_padres' %}" style="display: flex; align-items: center; gap: 6px; padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9rem;">

        </div>
    </form>
</div>
{% endblock %}
