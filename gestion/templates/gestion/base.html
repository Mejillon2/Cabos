{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Cuadra Erre</title>
    <link rel="stylesheet" href="{% static 'gestion/estilos.css' %}">
    <!-- Iconos sugeridos (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <!-- BARRA LATERAL (SIDEBAR) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="{% static 'gestion/Imagenes/logo_cuadra.png' %}" alt="Logo" class="sidebar-logo">
        </div>

        <nav class="sidebar-menu">
            <a href="{% url 'index' %}">
                <i class="fa-solid fa-house"></i> Inicio
            </a>
            <a href="{% url 'lista_terapeutas' %}">
                <i class="fa-solid fa-user-doctor"></i> Terapeutas
            </a>
            <a href="{% url 'lista_pacientes' %}">
                <i class="fa-solid fa-users"></i> Pacientes
            </a>
            <a href="{% url 'lista_caballos' %}">
                <i class="fa-solid fa-horse"></i> Caballos
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="{% url 'logout_view' %}" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> Salir
            </a>
        </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <header class="main-header">
            <h1>Panel de Control</h1>
        </header>

        <section class="welcome-card">
            <div class="card-title">
                <i class="fa-solid fa-circle-check"></i>
                Bienvenido al Sistema de Equinoterapia
            </div>
            <p>Selecciona una opción del menú para gestionar la información.</p>
        </section>

        <!-- Aquí se insertaría el contenido de cada página -->
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
