{% extends 'gestion/base.html' %}

{% block content %}
<div class="welcome-card" style="margin-bottom: 20px; padding: 20px;">
    <h2 style="margin: 0; color: #333; display: flex; align-items: center; gap: 12px; font-size: 1.6rem;">
        <i class="fa-solid fa-user-pen" style="color: var(--guinda-principal, #800020);"></i> Modificar Expediente
    </h2>
    <p style="margin: 5px 0 0 0; color: #777; font-size: 0.9rem;">
        Edita la información personal o los datos clínicos del paciente seleccionado.
    </p>
</div>

<div class="welcome-card" style="max-width: 700px; padding: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <div class="card-title" style="background-color: #333; color: white; padding: 12px 20px; font-weight: bold; display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-id-card"></i> Formulario de Edición (ID del Paciente: {{ id_persona }})
    </div>
    
    <form method="POST" class="form-horizontal" style="padding: 25px; display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        <div>
            <h3 style="color: var(--guinda-principal, #800020); border-bottom: 1px solid #eee; padding-bottom: 5px; margin: 0 0 15px 0; font-size: 1.1rem; font-weight: 600;">
                Datos Personales
            </h3>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-weight: 600; color: #444; font-size: 0.9rem;">Nombre Completo del Paciente:</label>
                <input type="text" name="nombre" value="{{ paciente_data.nombre }}" placeholder="Ej. Valeria Colin" required 
                       style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;">
            </div>
        </div>

        <div>
            <h3 style="color: var(--guinda-principal, #800020); border-bottom: 1px solid #eee; padding-bottom: 5px; margin: 10px 0 15px 0; font-size: 1.1rem; font-weight: 600;">
                Información Clínica
            </h3>
            
            <div style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px;">
                <label style="font-weight: 600; color: #444; font-size: 0.9rem;">Fecha de Nacimiento:</label>
                <input type="date" name="fecha_nac" value="{{ paciente_data.fecha_nac }}" required 
                       style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-weight: 600; color: #444; font-size: 0.9rem;">Diagnóstico Clínico Actual:</label>
                <textarea name="diagnostico" required rows="4" placeholder="Modifica el diagnóstico si es necesario..." 
                          style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; font-family: inherit; resize: vertical;">{{ paciente_data.diagnostico }}</textarea>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 20px;">
            <button type="submit" style="background-color: var(--guinda-principal, #800020); color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                💾 Guardar Cambios
            </button>
            <a href="{% url 'lista_pacientes' %}" style="display: flex; align-items: center; gap: 6px; padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 0.9rem;">
                ❌ Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
