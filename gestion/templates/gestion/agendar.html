{% extends 'gestion/base.html' %}

{% block content %}
<!-- Encabezado de la Sección -->
<header class="main-header">
    <h1><i class="fa-solid fa-calendar-check"></i> Agendar Sesión de Equinoterapia</h1>
</header>

<div class="welcome-card" style="max-width: 700px; margin: 20px auto; padding: 30px;">
    <div class="card-title" style="font-size: 1.5rem; border-bottom: 2px solid var(--guinda-principal); padding-bottom: 10px; margin-bottom: 20px;">
        <i class="fa-solid fa- file-signature"></i> Datos de la Sesión
    </div>

    <!-- El formulario envía los datos a la vista agendar_cita -->
    <form method="POST" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        {% csrf_token %}

        <!-- Selección de Paciente -->
        <div style="grid-column: span 2;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Paciente:</label>
            <select name="paciente" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                <option value="" disabled selected>Seleccione al paciente...</option>
                {% for p in pacientes %}
                    <option value="{{ p.0 }}">{{ p.1 }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Selección de Terapeuta -->
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Terapeuta:</label>
            <select name="terapeuta" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                <option value="" disabled selected>Seleccione especialista...</option>
                {% for t in terapeutas %}
                    <option value="{{ t.0 }}">{{ t.1 }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Selección de Caballo (Basado en imagen_36.png) -->
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Caballo:</label>
            <select name="caballo" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
                <option value="" disabled selected>Asignar caballo...</option>
                {% for c in caballos %}
                    <option value="{{ c.0 }}">{{ c.1 }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Fecha de la Sesión -->
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Fecha:</label>
            <input type="date" name="fecha" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
        </div>

        <!-- Hora de la Sesión -->
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Hora:</label>
            <input type="time" name="hora" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
        </div>

        <!-- Estado de la Sesión (Opcional, ya que por defecto es 'Programada') -->
        <div style="grid-column: span 2;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Notas / Observaciones Iniciales:</label>
            <textarea name="notas" rows="3" placeholder="Detalles importantes para la sesión..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; resize: none;"></textarea>
        </div>

        <!-- Botones de Acción -->
        <div style="grid-column: span 2; display: flex; gap: 15px; margin-top: 10px;">
            <button type="submit" class="btn-logout" style="flex: 2; background-color: var(--guinda-principal); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.3s;">
                <i class="fa-solid fa-floppy-disk"></i> Agendar Sesión
            </button>
            <a href="{% url 'index' %}" style="flex: 1; text-align: center; background-color: #6c757d; color: white; padding: 15px; border-radius: 8px; text-decoration: none; transition: 0.3s;">
                Cancelar
            </a>
        </div>
    </form>
</div>

<style>
    /* Efecto hover para el botón de agendar */
    button[type="submit"]:hover {
        background-color: #4d0000 !important;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    
    select:focus, input:focus, textarea:focus {
        outline: none;
        border-color: var(--guinda-principal) !important;
        box-shadow: 0 0 5px rgba(128, 0, 0, 0.2);
    }
</style>
{% endblock %}
