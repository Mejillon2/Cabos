{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Cuadra Erre</title>
    <!-- Enlace a tu CSS -->
    <link rel="stylesheet" href="{% static 'gestion/estilos.css' %}">
</head>
<body class="login-body">

    <div class="login-container">
        <!-- Logo con el caballo -->
        <div class="login-logo">
            <img src="{% static 'Imagenes/logo_cuadra.png' %}" alt="Cuadra Erre Logo">
        </div>

        <h2>Acceso al Sistema</h2>

        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">ENTRAR</button>
        </form>
    </div>

</body>
</html>
